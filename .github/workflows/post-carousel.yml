name: Post Instagram Carousel

on:
  workflow_dispatch:
    inputs:
      carousel:
        description: 'Nome do carousel (ex: 01-5-leads-perdidos)'
        required: true

  schedule:
    # Todos os horários em UTC. BRT = UTC-3
    # 12:00 BRT = 15:00 UTC | 19:00 BRT = 22:00 UTC

    # Post 03 — 02/06 (ter) 12:00 BRT → Carousel 06
    - cron: '0 15 2 6 *'
    # Post 04 — 03/06 (qua) 19:00 BRT → Carousel 03
    - cron: '0 22 3 6 *'
    # Post 05 — 04/06 (qui) 12:00 BRT → Carousel 02
    - cron: '0 15 4 6 *'
    # Post 06 — 05/06 (sex) 19:00 BRT → Carousel 05
    - cron: '0 22 5 6 *'
    # Post 07 — 08/06 (seg) 12:00 BRT → Carousel 07
    - cron: '0 15 8 6 *'
    # Post 08 — 11/06 (qui) 19:00 BRT → Carousel 08
    - cron: '0 22 11 6 *'
    # Post 09 — 14/06 (dom) 12:00 BRT → Carousel 09
    - cron: '0 15 14 6 *'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determinar carousel pelo schedule
        id: carousel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.carousel }}" >> $GITHUB_OUTPUT
          else
            DAY=$(date -u +%-d)
            MONTH=$(date -u +%-m)

            if   [ "$MONTH" = "6" ] && [ "$DAY" = "2" ];  then echo "name=06-vendedor-23h" >> $GITHUB_OUTPUT
            elif [ "$MONTH" = "6" ] && [ "$DAY" = "3" ];  then echo "name=03-concorrente-no-box" >> $GITHUB_OUTPUT
            elif [ "$MONTH" = "6" ] && [ "$DAY" = "4" ];  then echo "name=02-calculadora-leads-perdidos" >> $GITHUB_OUTPUT
            elif [ "$MONTH" = "6" ] && [ "$DAY" = "5" ];  then echo "name=05-resultado-prova" >> $GITHUB_OUTPUT
            elif [ "$MONTH" = "6" ] && [ "$DAY" = "8" ];  then echo "name=07-perguntas-do-lead" >> $GITHUB_OUTPUT
            elif [ "$MONTH" = "6" ] && [ "$DAY" = "11" ]; then echo "name=08-no-show-rombo" >> $GITHUB_OUTPUT
            elif [ "$MONTH" = "6" ] && [ "$DAY" = "14" ]; then echo "name=09-como-funciona" >> $GITHUB_OUTPUT
            else echo "Nenhum carousel agendado para hoje." && exit 1
            fi
          fi

      - name: Postar carousel no Instagram
        env:
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        run: node scheduler/post-carousel.js ${{ steps.carousel.outputs.name }}
